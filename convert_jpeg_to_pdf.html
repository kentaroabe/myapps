<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像をPDFに変換</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #667eea; --secondary: #6c757d; --bg: #f0f2f5; --radius: 10px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', Arial, sans-serif; background: var(--bg); }
    .page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .btn-back {
      padding: 8px 16px; background: var(--secondary); color: white;
      border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; white-space: nowrap;
    }
    .btn-back:hover { background: #545b62; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #333; }
    main { padding: 0 24px 40px; max-width: 700px; margin: 0 auto; }
    .drop-zone {
      border: 3px dashed #ccc; border-radius: var(--radius); padding: 48px 24px;
      text-align: center; color: #777; background: white; cursor: pointer;
      transition: all 0.2s; font-size: 1rem;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: #f0f2ff; color: var(--primary); }
    .note {
      margin-top: 16px; padding: 12px 16px; background: #e8f4f8;
      border-radius: 8px; font-size: 0.85rem; color: #0c5460;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1>📄 画像をPDFに変換</h1>
  </div>
  <main>
    <div id="drop-zone" class="drop-zone">
      ここに画像ファイルをドラッグ＆ドロップ、またはクリックして選択
      <input type="file" id="file-upload" accept=".jpeg,.jpg,.jfif,.png" multiple style="display:none;">
    </div>
    <p class="note">📌 JPEG・PNG・JFIFファイルに対応。複数ファイルを選択すると1つのPDFに結合します。</p>
  </main>
  <script>
    const { jsPDF } = window.jspdf;
    const dropZone = document.getElementById('drop-zone');
    const fileUpload = document.getElementById('file-upload');

    dropZone.addEventListener('click', () => fileUpload.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    fileUpload.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(files) {
      if (!files.length) { alert('JPEG またはPNGファイルを選択してください。'); return; }

      let pdf;
      let imageAdded = false;
      const validTypes = ['image/jpeg', 'image/jpg', 'image/jfif', 'image/png'];

      for (const file of files) {
        const isValid = validTypes.includes(file.type) ||
          /\.(jfif|jpg|jpeg|png)$/i.test(file.name);
        if (!isValid) { alert(`${file.name} はサポートされていないファイル形式です。スキップします。`); continue; }

        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let orientation = img.width > img.height ? 'l' : 'p';
            let imgWidth = orientation === 'l' ? 297 : 210;
            let imgHeight = (img.height * imgWidth) / img.width;

            if (!imageAdded) {
              pdf = new jsPDF({ orientation });
            } else {
              pdf.addPage(orientation);
            }
            pdf.addImage(img, file.type === 'image/png' ? 'PNG' : 'JPEG', 0, 0, imgWidth, imgHeight);
            imageAdded = true;
          };
          img.onerror = () => alert(`${file.name} の読み込み中にエラーが発生しました。`);
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      fileUpload.value = '';
      setTimeout(() => {
        if (imageAdded) {
          const baseName = files[0].name.replace(/\.[^.]+$/, '');
          pdf.save(`${baseName}.pdf`);
        } else {
          alert('PDFに変換できる画像がありませんでした。');
        }
      }, 1000);
    }
  </script>
</body>
</html>
