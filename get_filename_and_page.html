<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFの枚数取得</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
  <style>
    :root { --primary: #667eea; --secondary: #6c757d; --success: #28a745; --bg: #f0f2f5; --radius: 10px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', Arial, sans-serif; background: var(--bg); }
    .page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .btn-back {
      padding: 8px 16px; background: var(--secondary); color: white;
      border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; white-space: nowrap;
    }
    .btn-back:hover { background: #545b62; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #333; }
    main { padding: 0 24px 40px; max-width: 800px; margin: 0 auto; }
    .drop-zone {
      border: 3px dashed #ccc; border-radius: var(--radius); padding: 40px 24px;
      text-align: center; color: #777; background: white; cursor: pointer;
      transition: all 0.2s; margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: #f0f2ff; color: var(--primary); }
    .result-card { background: white; border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #dee2e6; padding: 9px 14px; text-align: left; font-size: 0.9rem; }
    th { background: #f8f9fa; font-weight: 600; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #e9ecef; }
    .sort-indicator { margin-left: 6px; font-size: 0.75rem; color: #aaa; }
    .btn-copy {
      margin-top: 14px; padding: 10px 20px; background: var(--success); color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: inherit; font-weight: 500;
    }
    .btn-copy:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1>📊 PDFの枚数取得</h1>
  </div>
  <main>
    <div id="drop-zone" class="drop-zone">
      ここにPDF・JPEG・PNGをドロップ、または Ctrl+V で貼り付け
    </div>

    <div class="result-card" id="result-card" style="display:none;">
      <strong>ファイル一覧</strong>
      <table id="result-table">
        <thead>
          <tr>
            <th class="sortable" data-key="name">ファイル名 <span class="sort-indicator" id="name-indicator">▲▼</span></th>
            <th class="sortable" data-key="pages">ページ数 <span class="sort-indicator" id="pages-indicator">▲▼</span></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button class="btn-copy" id="copy-button">📋 クリップボードにコピー（Excel対応）</button>
    </div>
  </main>
  <script>
    const dropZone = document.getElementById('drop-zone');
    const resultCard = document.getElementById('result-card');
    const tbody = document.querySelector('#result-table tbody');
    const sortIndicators = {
      name: document.getElementById('name-indicator'),
      pages: document.getElementById('pages-indicator')
    };
    let rowDataList = [];
    let currentSort = { key: 'name', order: 'asc' };

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', async e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      await processFiles([...e.dataTransfer.files]);
    });
    window.addEventListener('paste', async e => {
      const files = [];
      for (const item of e.clipboardData.items) {
        if (item.kind === 'file') { const f = item.getAsFile(); if (f) files.push(f); }
      }
      if (files.length) await processFiles(files);
    });

    async function processFiles(files) {
      resultCard.style.display = 'block';
      files.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      for (const file of files) {
        const ext = (file.name || '').toLowerCase().split('.').pop();
        if (file.type === 'application/pdf') {
          const buffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
          rowDataList.push({ name: file.name, pages: pdf.numPages });
        } else if (['jpg', 'jpeg', 'png'].includes(ext) || file.type.startsWith('image/')) {
          rowDataList.push({ name: file.name || 'clipboard-image.png', pages: 1 });
        }
      }
      sortAndRender(currentSort.key, currentSort.order);
    }

    function sortAndRender(key, order) {
      rowDataList.sort((a, b) => {
        if (key === 'name') return order === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
        if (key === 'pages') return order === 'asc' ? a.pages - b.pages : b.pages - a.pages;
      });
      for (const k in sortIndicators) sortIndicators[k].textContent = '▲▼';
      sortIndicators[key].textContent = order === 'asc' ? '▲' : '▼';
      tbody.innerHTML = '';
      rowDataList.forEach(d => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${d.name}</td><td>${d.pages}</td>`;
        tbody.appendChild(row);
      });
    }

    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (currentSort.key === key) {
          currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort.key = key; currentSort.order = 'asc';
        }
        sortAndRender(currentSort.key, currentSort.order);
      });
    });

    document.getElementById('copy-button').addEventListener('click', () => {
      const text = rowDataList.map(d => `${d.name}\t${d.pages}`).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        alert('クリップボードにコピーしました。Excelに貼り付けできます。');
      });
    });
  </script>
</body>
</html>
