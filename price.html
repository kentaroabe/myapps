<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格並べ替え</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root { --primary: #667eea; --secondary: #6c757d; --success: #28a745; --bg: #f0f2f5; --radius: 10px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', Arial, sans-serif; background: var(--bg); }
    .page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .btn-back {
      padding: 8px 16px; background: var(--secondary); color: white;
      border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; white-space: nowrap;
    }
    .btn-back:hover { background: #545b62; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #333; }
    main { padding: 0 24px 40px; }
    .toolbar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
      background: white; border-radius: var(--radius); padding: 16px 20px;
      margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .toolbar label { font-size: 0.9rem; font-weight: 500; color: #555; white-space: nowrap; }
    .toolbar input[type="text"] {
      flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid #dee2e6;
      border-radius: 8px; font-size: 0.9rem; font-family: inherit;
    }
    .toolbar input[type="range"] { flex: 0 0 160px; }
    .drop-zone {
      border: 3px dashed #ccc; border-radius: var(--radius); padding: 40px 24px;
      text-align: center; color: #777; background: white; cursor: pointer;
      transition: all 0.2s; margin-bottom: 16px; font-size: 1rem;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: #f0f2ff; color: var(--primary); }
    #image-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .image-item { position: relative; cursor: move; }
    .image-item img { width: 100%; border: 2px solid #dee2e6; border-radius: 6px; display: block; }
    .image-item.group-marker img { border-color: #dc3545; border-width: 3px; }
    .image-item.selected img { border-color: #6c1011; border-width: 3px; box-shadow: 0 0 10px rgba(108,16,17,0.5); }
    .filename {
      position: absolute; bottom: 4px; left: 4px; right: 4px;
      background: rgba(255,255,255,0.9); font-size: 11px; text-align: center;
      padding: 2px 4px; border-radius: 4px; cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .filename input {
      width: 100%; border: none; background: transparent; font-size: 11px;
      text-align: center; outline: none; font-family: inherit;
    }
    button {
      padding: 10px 18px; color: white; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-family: inherit; font-weight: 500;
    }
    #save-order { background: var(--success); margin-top: 16px; }
    #save-order:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1>💲 価格並べ替え</h1>
  </div>
  <main>
    <div class="toolbar">
      <label for="prefix-input">1列目の値（任意）：</label>
      <input type="text" id="prefix-input" placeholder="空白の場合は通常通り出力">
      <label for="size-range">表示サイズ：</label>
      <input type="range" id="size-range" min="50" max="500" value="150">
    </div>

    <div id="drop-zone" class="drop-zone">画像をここにドラッグ＆ドロップしてください</div>

    <div id="image-grid"></div>
    <button id="save-order">💾 並び順を保存（クリップボードにコピー）</button>
  </main>
  <script>
    const dropZone = document.getElementById('drop-zone');
    const imageGrid = document.getElementById('image-grid');
    const sizeRange = document.getElementById('size-range');
    const prefixInput = document.getElementById('prefix-input');
    let imageDataList = [];
    let originalFilenameMap = new Map();

    const saved = localStorage.getItem('imageSorterPrefixValue');
    if (saved) prefixInput.value = saved;
    prefixInput.addEventListener('input', () => localStorage.setItem('imageSorterPrefixValue', prefixInput.value));

    const isGroupMarker = fn => /^[1-9]\d{3,}$/.test(fn.split('/').pop().split('.')[0]);
    const getLeadingNumber = fn => { const m = fn.match(/^(\d{4,})/); return m ? parseInt(m[1]) : Infinity; };
    const getOriginalBaseName = fn => fn.split('/').pop().replace(/^\d+_/, '');

    const generateDisplayName = (group, counter, orig) => {
      if (isGroupMarker(orig)) return orig;
      return `${group + counter}_${getOriginalBaseName(orig)}`;
    };

    const updateAllDisplayNames = () => {
      let group = 1000, counter = 1;
      for (const item of imageGrid.children) {
        const orig = item.dataset.filename;
        if (isGroupMarker(orig)) { group = parseInt(orig.split('.')[0]); counter = 1; continue; }
        item.querySelector('.filename').textContent = generateDisplayName(group, counter, orig);
        counter++;
      }
    };

    const makeFilenameEditable = (filenameDiv, orig, currentDisplay) => {
      if (isGroupMarker(orig)) return;
      const match = currentDisplay.match(/^(\d+_)(.+)\.([^.]+)$/);
      if (!match) return;
      const [, numPart, basePart, ext] = match;
      const input = document.createElement('input');
      input.type = 'text'; input.value = basePart;
      filenameDiv.innerHTML = ''; filenameDiv.appendChild(input);
      input.focus(); input.select();
      const save = () => {
        const newBase = input.value.trim();
        if (newBase) {
          const newDisplay = `${numPart}${newBase}.${ext}`;
          filenameDiv.textContent = newDisplay;
          const oldName = filenameDiv.parentElement.dataset.filename;
          const newOrig = `${newBase}.${ext}`;
          filenameDiv.parentElement.dataset.filename = newOrig;
          const item = imageDataList.find(i => i.filename === oldName);
          if (item) item.filename = newOrig;
        } else {
          filenameDiv.textContent = currentDisplay;
        }
      };
      input.addEventListener('blur', save);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        else if (e.key === 'Escape') { filenameDiv.textContent = currentDisplay; }
      });
    };

    sizeRange.addEventListener('input', () => {
      document.querySelectorAll('.image-item').forEach(item => item.style.width = `${sizeRange.value}px`);
    });

    const readFileAsDataURL = file => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve({ file, dataURL: reader.result });
      reader.readAsDataURL(file);
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', async e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      imageGrid.innerHTML = ''; imageDataList = [];
      const files = Array.from(e.dataTransfer.files)
        .filter(f => f.type.startsWith('image/'))
        .sort((a, b) => getLeadingNumber(a.name) - getLeadingNumber(b.name));

      for (const file of files) {
        const { dataURL } = await readFileAsDataURL(file);
        const div = document.createElement('div');
        div.className = 'image-item';
        div.dataset.filename = file.name;
        div.dataset.originalFilename = file.name;
        div.style.width = `${sizeRange.value}px`;

        const img = document.createElement('img'); img.src = dataURL;
        const label = document.createElement('div'); label.className = 'filename';
        div.appendChild(img); div.appendChild(label);
        if (isGroupMarker(file.name)) div.classList.add('group-marker');
        div.addEventListener('click', () => {
          document.querySelectorAll('.image-item').forEach(i => i.classList.remove('selected'));
          div.classList.add('selected');
        });
        div.addEventListener('dblclick', () => {
          if (!isGroupMarker(file.name)) makeFilenameEditable(label, file.name, label.textContent);
        });
        label.addEventListener('click', e => {
          e.stopPropagation();
          makeFilenameEditable(label, file.name, label.textContent);
        });
        imageGrid.appendChild(div);
        imageDataList.push({ filename: file.name, dataURL });
      }
      updateAllDisplayNames();
    });

    new Sortable(imageGrid, { animation: 150, onEnd: () => { updateAllDisplayNames(); } });

    document.getElementById('save-order').addEventListener('click', async () => {
      const items = Array.from(imageGrid.children);
      const prefix = prefixInput.value.trim();
      let group = 1000, counter = 1;
      const lines = [];
      for (const item of items) {
        const curr = item.dataset.filename;
        const orig = item.dataset.originalFilename;
        if (isGroupMarker(curr)) { group = parseInt(curr.split('.')[0]); counter = 1; continue; }
        const newName = `${group + counter}_${getOriginalBaseName(curr)}`;
        const origOnly = orig.split('.')[0];
        const ext = orig.split('.').pop();
        const newOnly = newName.split('.')[0];
        if (prefix) lines.push(`${prefix}\t${origOnly}\t${ext}\t\t\t\t\t\t${newOnly}`);
        else lines.push(`${origOnly}\t${ext}\t\t\t\t\t\t${newOnly}`);
        counter++;
      }
      try {
        await navigator.clipboard.writeText(lines.join('\n'));
        if (prefix) alert('コピー完了！\n形式：1列目の値 / 元ファイル名（拡張子なし） / 拡張子 / （空白5列） / 新ファイル名');
        else alert('コピー完了！\n形式：元ファイル名（拡張子なし） / 拡張子 / （空白5列） / 新ファイル名');
      } catch { alert('クリップボードコピーに失敗しました。'); }
    });
  </script>
</body>
</html>
