<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像を正方形にする</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #667eea;
      --secondary: #6c757d;
      --bg: #f0f2f5;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', Arial, sans-serif; background: var(--bg); }
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .btn-back {
      padding: 8px 16px;
      background: var(--secondary);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn-back:hover { background: #545b62; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #333; }
    main { padding: 0 24px 40px; max-width: 700px; margin: 0 auto; }
    .drop-zone {
      border: 3px dashed #ccc;
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      color: #777;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: #f0f2ff;
      color: var(--primary);
    }
    #file-input { display: none; }
    .note {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1>🔲 画像を正方形にするツール</h1>
  </div>
  <main>
    <div class="drop-zone" id="drop-area">
      ここに画像をドラッグ＆ドロップ、またはクリックして選択
      <input type="file" id="file-input" accept="image/*">
    </div>
    <p class="note">
      ⚠️ 横長画像：白い余白を上下に追加して正方形にします。<br>
      縦長画像：上端を基準にトリミングして正方形にします。
    </p>
    <canvas id="canvas" style="display:none;"></canvas>
  </main>
  <script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    dropArea.addEventListener('click', () => fileInput.click());
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processFile(file);
    });
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) processFile(file);
    });

    function processFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const size = Math.max(img.width, img.height);
          canvas.width = size;
          canvas.height = size;

          // 白背景
          ctx.fillStyle = 'white';
          ctx.fillRect(0, 0, size, size);

          if (img.width > img.height) {
            // 横長：上下に余白追加
            ctx.drawImage(img, 0, (size - img.height) / 2);
          } else {
            // 縦長：上端を基準にトリミング
            ctx.drawImage(img, 0, 0, img.width, img.width, 0, 0, size, size);
          }

          const baseFileName = file.name.replace(/\.[^/.]+$/, '');
          const link = document.createElement('a');
          link.download = `${baseFileName}_正方形.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
