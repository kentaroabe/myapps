<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF回転・分割ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --primary: #667eea; --primary-dark: #5a6fd6;
      --secondary: #6c757d; --danger: #dc3545; --bg: #f0f2f5; --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', Arial, sans-serif; background: var(--bg); }
    .page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .btn-back {
      padding: 8px 16px; background: var(--secondary); color: white;
      border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; white-space: nowrap;
    }
    .btn-back:hover { background: #545b62; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #333; }
    main { padding: 0 24px 40px; max-width: 1200px; margin: 0 auto; }
    .upload-box {
      border: 3px dashed var(--primary); border-radius: 16px; padding: 48px 24px;
      text-align: center; color: #777; cursor: pointer;
      background: #f8f9ff; transition: all 0.3s; margin-bottom: 20px;
    }
    .upload-box:hover, .upload-box.dragover { background: #e8ebff; border-color: var(--primary-dark); transform: translateY(-2px); }
    .upload-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .upload-text { font-size: 1.2rem; font-weight: 600; color: #333; }
    .upload-subtext { color: #999; font-size: 0.9rem; margin-top: 4px; }
    .file-input { display: none; }
    .controls {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-start;
      background: white; border-radius: var(--radius); padding: 16px 20px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .btn-primary { background: linear-gradient(45deg, var(--primary), #764ba2); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(102,126,234,0.3); }
    .btn-secondary { background: var(--secondary); color: white; }
    .btn-secondary:hover { background: #545b62; transform: translateY(-2px); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #c82333; transform: translateY(-2px); }
    .pages-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px;
    }
    .page-item {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08); transition: all 0.3s; position: relative;
    }
    .page-item:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .page-preview { width: 100%; height: 280px; object-fit: contain; background: #f8f9fa; border-bottom: 1px solid #eee; }
    .page-controls { padding: 16px; text-align: center; }
    .page-number { font-size: 1rem; font-weight: 700; color: #333; margin-bottom: 10px; }
    .rotation-display { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
    .page-buttons { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
    .btn-small { padding: 7px 14px; font-size: 0.85rem; }
    .split-control { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .split-label { font-size: 0.85rem; color: #666; cursor: pointer; user-select: none; }
    .page-item.split-after::after {
      content: ''; position: absolute; bottom: 0; left: 16px; right: 16px;
      height: 4px; background: linear-gradient(45deg, #ff6b6b, #ee5a24); border-radius: 2px;
    }
    .loading { text-align: center; padding: 40px; display: none; }
    .spinner {
      border: 5px solid #f0f0f0; border-top: 5px solid var(--primary);
      border-radius: 50%; width: 48px; height: 48px;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media (max-width: 600px) { .pages-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1>🔄 PDF回転・分割ツール</h1>
  </div>
  <main>
    <div class="upload-box" id="uploadBox">
      <div class="upload-icon">📁</div>
      <div class="upload-text">PDFファイルをドロップまたはクリックして選択</div>
      <div class="upload-subtext">対応形式: PDF</div>
    </div>
    <input type="file" id="fileInput" class="file-input" accept=".pdf">

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>PDFを読み込み中...</div>
    </div>

    <div class="controls" id="controls" style="display:none;">
      <button class="btn btn-primary" onclick="downloadRotated()">🔄 回転したPDFをダウンロード</button>
      <button class="btn btn-secondary" onclick="downloadSplit()">✂️ 分割したPDFをダウンロード</button>
      <button class="btn btn-danger" onclick="resetAll()">🗑️ リセット</button>
    </div>

    <div id="pagesContainer" style="display:none;">
      <div class="pages-grid" id="pagesGrid"></div>
    </div>
  </main>

  <script>
    let originalPdfDoc = null;
    let pageRotations = {};
    let splitPoints = new Set();
    let originalFileName = '';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    uploadBox.addEventListener('click', () => fileInput.click());
    uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('dragover'); });
    uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
    uploadBox.addEventListener('drop', e => {
      e.preventDefault(); uploadBox.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0 && files[0].type === 'application/pdf') loadPDF(files[0]);
    });
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) loadPDF(e.target.files[0]);
    });

    async function loadPDF(file) {
      try {
        document.getElementById('loading').style.display = 'block';
        originalFileName = file.name.replace(/\.pdf$/i, '');
        const buf = await file.arrayBuffer();
        originalPdfDoc = await PDFLib.PDFDocument.load(buf);
        const pdf = await pdfjsLib.getDocument(buf).promise;
        await renderPages(pdf);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('pagesContainer').style.display = 'block';
        document.getElementById('uploadBox').style.display = 'none';
      } catch (e) {
        alert('PDFの読み込みに失敗しました。');
        document.getElementById('loading').style.display = 'none';
      }
    }

    async function renderPages(pdf) {
      const grid = document.getElementById('pagesGrid');
      grid.innerHTML = '';
      pageRotations = {}; splitPoints.clear();
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const vp = page.getViewport({ scale: 1.5 });
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        grid.appendChild(createPageItem(i, canvas.toDataURL()));
        pageRotations[i] = 0;
      }
    }

    function createPageItem(num, previewUrl) {
      const item = document.createElement('div');
      item.className = 'page-item';
      item.innerHTML = `
        <img src="${previewUrl}" alt="Page ${num}" class="page-preview" id="preview-${num}">
        <div class="page-controls">
          <div class="page-number">ページ ${num}</div>
          <div class="rotation-display" id="rotation-${num}">回転: 0°</div>
          <div class="page-buttons">
            <button class="btn btn-primary btn-small" onclick="rotatePage(${num}, -90)">↺ 左</button>
            <button class="btn btn-primary btn-small" onclick="rotatePage(${num}, 90)">↻ 右</button>
          </div>
          <div class="split-control">
            <input type="checkbox" id="split-${num}" onchange="toggleSplit(${num})">
            <label for="split-${num}" class="split-label">このページの後で分割</label>
          </div>
        </div>`;
      return item;
    }

    function rotatePage(num, deg) {
      pageRotations[num] = (pageRotations[num] + deg + 360) % 360;
      document.getElementById(`preview-${num}`).style.transform = `rotate(${pageRotations[num]}deg)`;
      document.getElementById(`rotation-${num}`).textContent = `回転: ${pageRotations[num]}°`;
    }

    function toggleSplit(num) {
      const cb = document.getElementById(`split-${num}`);
      const item = cb.closest('.page-item');
      if (cb.checked) { splitPoints.add(num); item.classList.add('split-after'); }
      else { splitPoints.delete(num); item.classList.remove('split-after'); }
    }

    async function downloadRotated() {
      if (!originalPdfDoc) return;
      document.getElementById('loading').style.display = 'block';
      try {
        const newDoc = await PDFLib.PDFDocument.create();
        const pages = await newDoc.copyPages(originalPdfDoc, [...Array(originalPdfDoc.getPageCount())].map((_, i) => i));
        pages.forEach((p, i) => {
          const rot = pageRotations[i+1] || 0;
          if (rot) p.setRotation(PDFLib.degrees(rot));
          newDoc.addPage(p);
        });
        downloadPDF(await newDoc.save(), `${originalFileName}_rotated.pdf`);
      } catch (e) { alert('PDF生成に失敗しました。'); }
      document.getElementById('loading').style.display = 'none';
    }

    async function downloadSplit() {
      if (!originalPdfDoc || !splitPoints.size) { alert('分割ポイントが設定されていません。'); return; }
      document.getElementById('loading').style.display = 'block';
      try {
        const points = Array.from(splitPoints).sort((a, b) => a - b);
        let start = 0, part = 1;
        for (const sp of points) {
          await savePart(start, sp, part++);
          start = sp;
        }
        if (start < originalPdfDoc.getPageCount()) await savePart(start, originalPdfDoc.getPageCount(), part);
      } catch (e) { alert('PDF分割に失敗しました。'); }
      document.getElementById('loading').style.display = 'none';
    }

    async function savePart(start, end, part) {
      const doc = await PDFLib.PDFDocument.create();
      const indices = Array.from({ length: end - start }, (_, i) => start + i);
      const pages = await doc.copyPages(originalPdfDoc, indices);
      pages.forEach((p, i) => {
        const rot = pageRotations[start + i + 1] || 0;
        if (rot) p.setRotation(PDFLib.degrees(rot));
        doc.addPage(p);
      });
      downloadPDF(await doc.save(), `${originalFileName}_${part}.pdf`);
    }

    function downloadPDF(bytes, name) {
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function resetAll() {
      originalPdfDoc = null; pageRotations = {}; splitPoints.clear(); originalFileName = '';
      document.getElementById('pagesGrid').innerHTML = '';
      document.getElementById('fileInput').value = '';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('pagesContainer').style.display = 'none';
      document.getElementById('uploadBox').style.display = 'block';
    }
  </script>
</body>
</html>
