<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMPLEサムネイル作成</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
  <style>
    :root { --primary: #667eea; --secondary: #6c757d; --success: #28a745; --bg: #f0f2f5; --radius: 10px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', Arial, sans-serif; background: var(--bg); }
    .page-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .btn-back {
      padding: 8px 16px; background: var(--secondary); color: white;
      border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; white-space: nowrap;
    }
    .btn-back:hover { background: #545b62; }
    h1 { font-size: 1.2rem; font-weight: 700; color: #333; }
    main { padding: 0 24px 40px; max-width: 800px; margin: 0 auto; }
    .controls-card {
      background: white; border-radius: var(--radius); padding: 20px;
      margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    }
    .controls-card label { font-size: 0.9rem; font-weight: 500; color: #555; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .controls-card input[type="text"] {
      flex: 1; min-width: 200px; padding: 9px 12px; border: 1px solid #dee2e6;
      border-radius: 8px; font-size: 0.9rem; font-family: inherit;
    }
    .drop-zone {
      border: 3px dashed #ccc; border-radius: var(--radius); padding: 48px 24px;
      text-align: center; color: #777; background: white; cursor: pointer;
      transition: all 0.2s; font-size: 1rem; margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: #f0f2ff; color: var(--primary); }
    .btn-dl {
      display: block; width: 100%; padding: 12px; background: var(--success); color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-family: inherit;
      font-weight: 600; margin-bottom: 16px;
    }
    .btn-dl:disabled { background: #ccc; cursor: not-allowed; }
    .btn-dl:not(:disabled):hover { background: #218838; }
    #preview { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    .preview-item { text-align: center; }
    .preview-item canvas { max-width: 160px; border: 1px solid #dee2e6; border-radius: 6px; }
    .preview-item div { font-size: 0.8rem; color: #666; margin-top: 4px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1>🔲 SAMPLEサムネイル作成</h1>
  </div>
  <main>
    <div class="controls-card">
      <label><input type="radio" name="colorMode" value="normal" checked> そのまま</label>
      <label><input type="radio" name="colorMode" value="gray"> グレー</label>
      <input type="text" id="watermark-text" placeholder="透かし文字（省略時はファイル名）">
    </div>

    <div id="drop-zone" class="drop-zone">
      ここにPDFをドラッグ＆ドロップ、またはクリックして選択<br>
      <small>Ctrl+V でクリップボードから貼り付けも可</small>
      <input type="file" id="file-input" accept=".pdf" multiple style="display:none;">
    </div>

    <button class="btn-dl" id="download-all" disabled>📥 すべての画像をダウンロード</button>

    <div id="preview"></div>
  </main>
  <script>
    let processedFiles = [];
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const watermarkText = document.getElementById('watermark-text');
    const downloadAllBtn = document.getElementById('download-all');
    const preview = document.getElementById('preview');
    const colorModeRadios = document.getElementsByName('colorMode');

    function getColorMode() { return document.querySelector('input[name="colorMode"]:checked').value; }

    function applyGray(canvas) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(128,128,128,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      return canvas;
    }

    function addSampleWatermark(ctx, w, h) {
      ctx.save();
      ctx.font = 'bold 150px Arial';
      ctx.fillStyle = 'rgba(255,0,0,0.5)';
      ctx.textAlign = 'center';
      ctx.translate(w / 2, h / 2);
      ctx.rotate(-Math.PI / 8);
      ctx.fillText('SAMPLE', 0, 0);
      ctx.restore();
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function downloadFile(dataUrl, name) {
      const a = document.createElement('a'); a.href = dataUrl; a.download = name; a.click();
    }

    function updatePreviews() {
      preview.innerHTML = '';
      processedFiles.forEach(item => {
        const wrap = document.createElement('div'); wrap.className = 'preview-item';
        const c = document.createElement('canvas');
        c.width = item.canvas.width; c.height = item.canvas.height;
        c.getContext('2d').drawImage(item.canvas, 0, 0);
        const label = document.createElement('div'); label.textContent = item.fileName;
        wrap.appendChild(c); wrap.appendChild(label); preview.appendChild(wrap);
      });
    }

    function createBase(src) {
      const c = document.createElement('canvas');
      c.width = src.width; c.height = src.height;
      c.getContext('2d').drawImage(src, 0, 0);
      if (getColorMode() === 'gray') applyGray(c);
      return c;
    }

    document.addEventListener('paste', e => {
      if (e.clipboardData?.items) {
        for (const item of e.clipboardData.items) {
          if (item.kind === 'file') { const f = item.getAsFile(); if (f?.type === 'application/pdf') processPDF(f); }
        }
      }
    });

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      Array.from(e.dataTransfer.files).forEach(f => { if (f.type === 'application/pdf') processPDF(f); });
    });
    fileInput.addEventListener('change', e => {
      Array.from(e.target.files).forEach(f => { if (f.type === 'application/pdf') processPDF(f); });
    });

    colorModeRadios.forEach(radio => {
      radio.addEventListener('change', () => {
        processedFiles = processedFiles.map(item => ({ canvas: createBase(item.canvas), fileName: item.fileName }));
        updatePreviews();
      });
    });

    async function processPDF(file) {
      const fileName = file.name.replace(/\.pdf$/i, '');
      const reader = new FileReader();
      reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 2 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        if (getColorMode() === 'gray') applyGray(canvas);
        processedFiles.push({ canvas, fileName });
        updatePreviews();
        downloadAllBtn.disabled = false;
      };
      reader.readAsArrayBuffer(file);
    }

    downloadAllBtn.addEventListener('click', async () => {
      if (!processedFiles.length) return;
      const text = watermarkText.value || '';
      for (const item of processedFiles) {
        const base = createBase(item.canvas);
        const label = text || item.fileName;

        // 正方形SAMPLE画像を生成してダウンロード
        const size = Math.max(base.width, base.height);
        const sq = document.createElement('canvas');
        sq.width = size; sq.height = size;
        const sqCtx = sq.getContext('2d');
        sqCtx.fillStyle = 'white'; sqCtx.fillRect(0, 0, size, size);

        if (base.height > base.width) {
          sqCtx.drawImage(base, 0, 0, base.width, base.width, 0, 0, size, size);
        } else {
          sqCtx.drawImage(base, (size - base.width) / 2, (size - base.height) / 2);
        }

        // 透かし文字追加
        sqCtx.font = 'bold 50px Arial';
        sqCtx.fillStyle = 'rgba(255,0,0,1)';
        sqCtx.textAlign = 'center'; sqCtx.textBaseline = 'top';
        sqCtx.fillText(label, size / 2, 50);

        // SAMPLEウォーターマーク
        addSampleWatermark(sqCtx, size, size);

        await delay(400);
        downloadFile(sq.toDataURL('image/png'), `${item.fileName}.png`);
      }
    });
  </script>
</body>
</html>
