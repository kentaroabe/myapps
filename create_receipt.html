<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-background-tertiary);
            padding: 0;
            margin: 0;
        }

        .container {
            max-width: 100%;
            width: 100%;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: var(--color-background-primary);
            border-radius: var(--border-radius-lg);
            border: 0.5px solid var(--color-border-tertiary);
            padding: 20px;
            flex: 1;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 0.5px solid var(--color-border-tertiary);
            border-radius: var(--border-radius-md);
            font-family: inherit;
            color: var(--color-text-primary);
            background: var(--color-background-primary);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--color-border-primary);
            box-shadow: 0 0 0 3px var(--color-background-info);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
            background: var(--color-background-primary);
            border: 0.5px solid var(--color-border-secondary);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.98);
            background: var(--color-background-secondary);
        }

        .preview {
            margin-top: 24px;
            padding: 16px;
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-md);
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .preview strong {
            color: var(--color-text-primary);
            display: block;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        .amount-display {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text-info);
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>領収書生成</h1>

            <form onsubmit="generatePDF(event)">
                <div class="form-group">
                    <label for="shop">店名</label>
                    <input type="text" id="shop" placeholder="○○店" />
                </div>

                <div class="form-group">
                    <label for="date">日付</label>
                    <input type="date" id="date" />
                </div>

                <div class="form-group">
                    <label for="item">品名</label>
                    <input type="text" id="item" placeholder="商品A" />
                </div>

                <div class="form-group">
                    <label for="amount">金額（円）</label>
                    <input type="number" id="amount" placeholder="10000" min="0" step="100" />
                    <div class="amount-display" id="amountDisplay">¥0</div>
                </div>

                <div class="form-group">
                    <label for="notes">摘要（オプション）</label>
                    <textarea id="notes" placeholder="商品代金"></textarea>
                </div>

                <button type="submit">PDF ダウンロード</button>

                <div class="preview">
                    <strong>プレビュー</strong>
                    <div id="previewText"></div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('#shop, #date, #item, #amount, #notes');
        inputs.forEach(input => {
            input.addEventListener('change', updatePreview);
            input.addEventListener('input', updatePreview);
        });

        function updatePreview() {
            const shop = document.getElementById('shop').value || '店名';
            const date = document.getElementById('date').value || '未設定';
            const item = document.getElementById('item').value || '商品';
            const amount = parseInt(document.getElementById('amount').value) || 0;

            document.getElementById('amountDisplay').textContent = '¥' + amount.toLocaleString('ja-JP');

            const preview = `
${shop}
${date} 発行
${item} × 1
合計：¥${amount.toLocaleString('ja-JP')}
  `.trim();

            document.getElementById('previewText').textContent = preview;
        }

        function generatePDF(event) {
            event.preventDefault();

            const shop = document.getElementById('shop').value || '店名未入力';
            const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
            const item = document.getElementById('item').value || '商品';
            const amount = parseInt(document.getElementById('amount').value) || 0;
            const notes = document.getElementById('notes').value || '';

            const html = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <style>
        body { font-family: 'MS Mincho', serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 2px solid #000; padding: 40px; }
        .header { text-align: center; margin-bottom: 40px; }
        .title { font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .shop { font-size: 14px; margin-bottom: 30px; }
        .date { margin-bottom: 30px; font-size: 14px; }
        .items { margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 1px solid #000; padding: 8px; text-align: left; font-weight: bold; }
        td { padding: 12px 8px; border-bottom: 1px solid #000; }
        .amount-cell { text-align: right; }
        .total { margin-top: 20px; text-align: right; font-size: 18px; font-weight: bold; }
        .notes { margin-top: 30px; font-size: 12px; }
        .footer { margin-top: 50px; text-align: center; font-size: 12px; color: #666; }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="header">
          <div class="title">領 収 書</div>
        </div>
        <div class="shop">
          <strong>${shop}</strong>
        </div>
        <div class="date">
          <strong>発行日：${date}</strong>
        </div>
        <div class="items">
          <table>
            <thead>
              <tr>
                <th>品名</th>
                <th>数量</th>
                <th style="text-align: right;">金額</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>${item}</td>
                <td>1</td>
                <td class="amount-cell">¥${amount.toLocaleString('ja-JP')}</td>
              </tr>
            </tbody>
          </table>
          <div class="total">合計：¥${amount.toLocaleString('ja-JP')}</div>
        </div>
        ${notes ? `<div class="notes"><strong>摘要：</strong>${notes}</div>` : ''}
        <div class="footer">
          <p>このたびはご利用ありがとうございました。</p>
        </div>
      </div>
    </body>
    </html>
  `;

            const options = {
                margin: 0,
                filename: `receipt_${date}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(html).save();
        }

        // URLパラメーターで自動入力
        const params = new URLSearchParams(window.location.search);
        if (params.has('shop')) document.getElementById('shop').value = params.get('shop');
        if (params.has('date')) document.getElementById('date').value = params.get('date');
        if (params.has('item')) document.getElementById('item').value = params.get('item');
        if (params.has('amount')) document.getElementById('amount').value = params.get('amount');
        if (params.has('notes')) document.getElementById('notes').value = params.get('notes');

        // 初期プレビュー表示
        updatePreview();

        // 日付のデフォルト値を今日にする
        if (!document.getElementById('date').value) {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            updatePreview();
        }
    </script>
</body>

</html>
