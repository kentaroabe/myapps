<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B 領収書生成</title>
    <!-- html2canvas + jsPDF (direct, more reliable than html2pdf.js on mobile) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #e2e8f0; /* Darker background for contrast */
            color: var(--text);
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #ffffff; /* Explicitly white card */
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e1; /* Thicker, more visible border */
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            background: #f8fafc; /* Slight tint to see box */
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        /* Essential validation style */
        input:required:placeholder-shown,
        textarea:required:placeholder-shown {
            border-color: #ef4444; /* Red border if empty and required */
            background-color: #fef2f2;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-download {
            background: var(--primary);
            color: white;
        }

        .btn-share {
            background: #06c755; /* LINE Green */
            color: white;
            display: none; /* Only show on mobile if supported */
        }

        .preview-box {
            margin-top: 30px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 12px;
            white-space: pre-wrap;
            color: var(--text-muted);
        }

        .preview-box h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>領収書生成 (B2B)</h1>

        <div class="form-group">
            <label>宛名 (会社名等) <span style="color:#ef4444">*</span></label>
            <input type="text" id="client" placeholder="株式会社○○ 御中" required>
        </div>

        <div class="form-group">
            <label>発行日 <span style="color:#ef4444">*</span></label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>金額 (¥ 税込) <span style="color:#ef4444">*</span></label>
            <input type="number" id="amount" placeholder="金額を入力してください" required>
        </div>

        <div class="form-group">
            <label>ただし書き</label>
            <input type="text" id="item" value="業務委託料">
        </div>

        <div class="form-group">
            <label>発行者 (あなた / 会社) <span style="color:#ef4444">*</span></label>
            <input type="text" id="issuer" placeholder="あなたの氏名または屋号" required>
        </div>

        <div class="form-group">
            <label>住所・連絡先 (任意)</label>
            <textarea id="address" rows="2" placeholder="東京都..."></textarea>
        </div>

        <div class="btn-group">
            <button id="shareBtn" class="btn-share" onclick="handleGenerate('share')">LINE / 他のアプリで送る</button>
            <button class="btn-download" onclick="handleGenerate('save')">PDFを保存 (ダウンロード)</button>
        </div>

        <div id="statusMsg" style="text-align:center; font-size:12px; margin-top:10px; color:var(--primary); display:none;">生成中...</div>

        <div class="preview-box">
            <h3>Preview</h3>
            <div id="previewText"></div>
        </div>
    </div>

    <!-- Generated Content (Hidden) -->
    <div id="pdfContent" style="display:none;"></div>

    <script>
        // Init Date
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // URLパラメーターで自動入力
        // 例: ?client=株式会社○○&date=2026-03-24&amount=55000&item=業務委託料&issuer=山田太郎
        const params = new URLSearchParams(window.location.search);
        const paramMap = { client: 'client', date: 'date', amount: 'amount', item: 'item', issuer: 'issuer', address: 'address' };
        for (const [param, id] of Object.entries(paramMap)) {
            if (params.has(param)) document.getElementById(id).value = params.get(param);
        }

        // Check for Web Share API
        if (navigator.share) {
            document.getElementById('shareBtn').style.display = 'block';
        }

        const fields = ['client', 'date', 'amount', 'item', 'issuer', 'address'];
        fields.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        function updatePreview() {
            const client = document.getElementById('client').value || '(宛名なし)';
            const amount = parseInt(document.getElementById('amount').value || 0).toLocaleString();
            const item = document.getElementById('item').value;
            const text = `${client}
金額：¥${amount} (税込)
但し：${item}
発行：${document.getElementById('issuer').value || '未入力'}`;
            document.getElementById('previewText').textContent = text;
        }

        async function handleGenerate(mode) {
            // Validation Check
            const requiredFields = document.querySelectorAll('input[required]');
            let isValid = true;
            requiredFields.forEach(f => {
                if (!f.value) {
                    isValid = false;
                    f.focus(); // Focus first invalid
                }
            });

            if (!isValid) {
                alert('必須項目を入力してください（赤枠の箇所）。');
                return;
            }

            const status = document.getElementById('statusMsg');

            const client = document.getElementById('client').value || '無記名';
            const date = document.getElementById('date').value;
// ... (rest of the local variables)
            const amount = parseInt(document.getElementById('amount').value || 0);
            const item = document.getElementById('item').value;
            const issuer = document.getElementById('issuer').value;
            const address = document.getElementById('address').value;

            const html = `
                <div style="font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; padding: 40px; color: #333;">
                    <div style="text-align: center; border-bottom: 2px solid #333; margin-bottom: 40px;">
                        <h1 style="font-size: 32px; letter-spacing: 0.5em; margin-bottom: 10px;">領収書</h1>
                    </div>
                    
                    <div style="font-size: 18px; margin-bottom: 30px;">
                        <span style="border-bottom: 1px solid #333; padding-bottom: 2px;">${client} 様</span>
                    </div>

                    <div style="text-align: center; background: #f8f8f8; padding: 20px; border: 1px solid #ddd; margin-bottom: 40px;">
                        <div style="font-size: 14px; margin-bottom: 10px;">金額 (税込)</div>
                        <div style="font-size: 36px; font-weight: bold;">¥ ${amount.toLocaleString()} -</div>
                    </div>

                    <p style="margin-bottom: 40px;">但し、${item}として正に領収いたしました。</p>

                    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                        <div style="font-size: 14px;">
                            日付：${date}
                        </div>
                        <div style="text-align: right; line-height: 1.6;">
                            <div style="font-size: 18px; font-weight: bold;">${issuer}</div>
                            <div style="font-size: 12px; white-space: pre-wrap;">${address}</div>
                        </div>
                    </div>
                </div>
            `;

            const filename = `${date}_領収書_${issuer}.pdf`;

            // Inject into DOM at current scroll position so mobile browsers render it
            const wrapper = document.createElement('div');
            wrapper.style.cssText = [
                'position:absolute',
                `top:${window.scrollY}px`,
                'left:0',
                'width:794px',         // ~A4 width at 96dpi
                'background:#ffffff',
                'opacity:0.01',        // near invisible but still rendered
                'pointer-events:none',
                'z-index:-1',
            ].join(';');
            wrapper.innerHTML = html;
            document.body.appendChild(wrapper);

            try {
                status.style.display = 'block';
                status.textContent = 'PDFを生成しています...';

                // Capture
                const canvas = await html2canvas(wrapper, {
                    scale: 3,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#ffffff',
                    width: 794,
                    height: wrapper.scrollHeight,
                    windowWidth: 794,
                    scrollX: 0,
                    scrollY: -window.scrollY
                });

                // Build PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ unit: 'pt', format: 'a4', orientation: 'portrait' });
                const pageW = pdf.internal.pageSize.getWidth();
                const pageH = pdf.internal.pageSize.getHeight();
                const imgH = pageW * canvas.height / canvas.width;
                const imgData = canvas.toDataURL('image/jpeg', 0.96);

                // If content is taller than one page, paginate
                let yOffset = 0;
                let remaining = imgH;
                while (remaining > 0) {
                    if (yOffset > 0) pdf.addPage();
                    const slice = Math.min(pageH, remaining);
                    pdf.addImage(imgData, 'JPEG', 0, -yOffset, pageW, imgH);
                    yOffset += pageH;
                    remaining -= pageH;
                }

                if (mode === 'save') {
                    pdf.save(filename);
                    status.style.display = 'none';
                } else {
                    const blob = pdf.output('blob');
                    const file = new File([blob], filename, { type: 'application/pdf' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        status.textContent = '共有メニューを開いています...';
                        try {
                            await navigator.share({
                                files: [file],
                                title: '領収書',
                                text: `${client}様 領収書`
                            });
                        } catch (err) {
                            console.error('Share cancelled or failed', err);
                        }
                    } else {
                        alert('このブラウザはファイル共有に対応していません。保存ボタンをお使いください。');
                    }
                    status.style.display = 'none';
                }
            } finally {
                document.body.removeChild(wrapper);
            }
        }

        updatePreview();
    </script>
</body>

</html>
